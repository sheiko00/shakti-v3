events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Web Dashboard (e.g. app.shakti.beauty)
    server {
        listen 80;
        server_name app.shakti.beauty; # Replace with your actual dashboard domain

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # Redirect to HTTPS (Uncomment after SSL is generated)
            # return 301 https://$host$request_uri;
            
            # Temporary HTTP proxy for initial setup
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # API (e.g. api.shakti.beauty)
    server {
        listen 80;
        server_name api.shakti.beauty; # Replace with your actual API domain

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # Redirect to HTTPS (Uncomment after SSL is generated)
            # return 301 https://$host$request_uri;

            # Temporary HTTP proxy for initial setup
            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS Servers (Uncomment and configure after Certbot SSL generation)
    # server {
    #     listen 443 ssl;
    #     server_name app.shakti.beauty;
    #     ssl_certificate /etc/letsencrypt/live/app.shakti.beauty/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/app.shakti.beauty/privkey.pem;
    #     
    #     location / {
    #         proxy_pass http://web:3000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
