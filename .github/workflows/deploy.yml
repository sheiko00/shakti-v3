name: Build & Push Docker Images to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/sheiko00/shakti-v3-api
  WEB_IMAGE: ghcr.io/sheiko00/shakti-v3-web

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (enables layer caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

      # 5. Build and push Web image
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache,mode=max

      # 6. Print deploy instructions
      - name: Print deploy instructions
        run: |
          echo "=========================================="
          echo "  Images pushed successfully!"
          echo "=========================================="
          echo "  API : ${{ env.API_IMAGE }}:latest"
          echo "  WEB : ${{ env.WEB_IMAGE }}:latest"
          echo ""
          echo "  On your VM, run:"
          echo "    docker compose pull"
          echo "    docker compose up -d"
          echo "=========================================="
